# P658207YA0A only.
# These values adjust the merged destination image for each camera's FR homography.
# Order of application: rotation first, then x/y translation.
# rotation_deg: positive rotates counterclockwise around the homography template center.
# x_offset: positive moves the warped camera image to the right.
# y_offset: positive moves the warped camera image downward.
# Scaled homographies are derived automatically in code. Edit only these unscaled values.

camera_1:
  rotation_deg: -0.27
  x_offset: 0.0
  y_offset: -30.0

camera_2:
  rotation_deg: 0.5
  x_offset: 0.0
  y_offset: 28.0

camera_3:
  rotation_deg: 0.13
  x_offset: 0.0
  y_offset: 18.0

camera_4:
  rotation_deg: 0.05
  x_offset: -8.0
  y_offset: 18.0

camera_5:
  rotation_deg: -0.10
  x_offset: -17.0
  y_offset: 32.0
